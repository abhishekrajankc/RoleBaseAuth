<div class="min-h-[calc(100vh-57px-48px)] bg-gray-50">
  <!-- Sub-navigation -->
  <div class="sticky top-0 z-40 border-b bg-white">
    <div class="mx-auto flex max-w-7xl gap-6 px-4 sm:px-6 lg:px-8">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="border-indigo-600 text-indigo-600"
          [routerLinkActiveOptions]="{ exact: true }"
          class="border-b-2 px-1 py-3 text-sm font-medium transition-colors border-transparent text-gray-500 hover:text-gray-700"
        >
          {{ link.label }}
        </a>
      }
    </div>
  </div>

  <!-- Content area — full width with good x-padding -->
  <div class="px-6 py-6 sm:px-8 lg:px-10">
    <router-outlet />
  </div>

  <!-- Toast -->
  @if (toastMessage(); as msg) {
    <div
      class="fixed right-4 top-20 z-50 rounded-lg px-4 py-3 text-sm font-medium text-white shadow-lg"
      [class.bg-green-500]="toastType() === 'success'"
      [class.bg-red-500]="toastType() === 'error'"
    >
      {{ msg }}
    </div>
  }
</div>
