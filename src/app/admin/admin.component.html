<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <h1 class="text-xl font-bold text-gray-900">Admin Dashboard</h1>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-500">
          {{ currentUser()?.name ?? 'Admin' }}
        </span>
        <span
          class="rounded-full bg-purple-100 px-3 py-1 text-xs font-medium text-purple-700"
        >
          Admin
        </span>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <div class="rounded-2xl bg-white p-6 shadow">
      <h2 class="text-lg font-semibold text-gray-900">User Management</h2>
      <p class="mt-2 text-sm text-gray-500">
        Welcome, {{ currentUser()?.name }}. This is the admin panel where you can
        manage users and roles.
      </p>
      <div class="mt-6 rounded-lg bg-gray-50 p-4">
        <p class="text-sm text-gray-500">
          Logged in as: <strong>{{ currentUser()?.email }}</strong>
        </p>
      </div>
    </div>
  </main>
</div>
