@if (isAuthenticated()) {
  @let user = currentUser();
  <nav class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <div class="flex items-center gap-6">
        <span class="text-lg font-bold text-gray-900">RoleBaseAuth</span>

        <div class="flex gap-4">
          @if (role() === 'admin') {
            <a routerLink="/admin/analytics" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Dashboard</a>
          }
          <a routerLink="/shop" class="text-sm font-medium text-gray-600 hover:text-gray-900">Shop</a>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <!-- Cart icon with live count — shown to all authenticated users -->
        <a routerLink="/shop/checkout/step/1" class="relative text-gray-500 hover:text-gray-700" title="View Cart">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z" />
          </svg>
          @if (cartCount() > 0) {
            <span class="absolute -right-2 -top-2 flex h-4 w-4 items-center justify-center rounded-full bg-indigo-600 text-[10px] font-bold text-white">
              {{ cartCount() }}
            </span>
          }
        </a>

        <span class="text-sm text-gray-500">{{ user?.name }}</span>
        <button
          (click)="logout()"
          class="rounded-lg bg-gray-100 px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-200"
        >
          Logout
        </button>
      </div>
    </div>
  </nav>
}

<main>
  <router-outlet />
</main>

<footer class="border-t bg-white px-4 py-3 text-center text-xs text-gray-400">
  &copy; 2026 RoleBaseAuth. All rights reserved.
</footer>
