@if (isAuthenticated()) {
  @let user = currentUser();
  <nav class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <div class="flex items-center gap-6">
        <span class="text-lg font-bold text-gray-900">RoleBaseAuth</span>

        <div class="flex gap-4">
          @if (role() === 'admin') {
            <a routerLink="/admin/analytics" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Dashboard</a>
          }
          <a routerLink="/shop" class="text-sm font-medium text-gray-600 hover:text-gray-900">Shop</a>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-500">{{ user?.name }}</span>
        <button
          (click)="logout()"
          class="rounded-lg bg-gray-100 px-3 py-1.5 text-sm font-medium text-gray-700 hover:bg-gray-200"
        >
          Logout
        </button>
      </div>
    </div>
  </nav>
}

<main>
  <router-outlet />
</main>

<footer class="border-t bg-white px-4 py-3 text-center text-xs text-gray-400">
  &copy; 2026 RoleBaseAuth. All rights reserved.
</footer>
