    <div [hidden]="hidden()">
      <label [for]="field().key" class="mb-1 block text-sm font-medium text-gray-700">
        {{ field().label }}
      </label>
      @if (field().type === 'textarea') {
        <textarea
          [id]="field().key"
          [name]="field().key"
          [placeholder]="field().placeholder ?? ''"
          rows="3"
          class="w-full rounded-lg border px-3 py-2 text-sm outline-none focus:border-indigo-500"
        ></textarea>
      } @else {
        <input
          [id]="field().key"
          [name]="field().key"
          [type]="field().type"
          [placeholder]="field().placeholder ?? ''"
          class="w-full rounded-lg border px-3 py-2 text-sm outline-none focus:border-indigo-500"
        />
      }
    </div>
