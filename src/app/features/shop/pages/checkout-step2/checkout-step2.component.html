<div class="mx-auto max-w-2xl">
  <h1 class="mb-6 text-2xl font-bold text-gray-900">Delivery Details</h1>

  <form [formGroup]="form" class="rounded-xl bg-white p-6 shadow-sm">
    <div class="grid gap-4 sm:grid-cols-2">
      @for (field of fields; track field.key) { 
      <app-form-field [field]="field"
                      [control]="getControl(field.key)"
                      [class.sm:col-span-2]="field.type === 'textarea'">
      </app-form-field>
      }
    </div>
  </form>

  <div class="mt-6 flex justify-between">
    <a routerLink="/shop/checkout/step/1" class="text-sm text-indigo-600 hover:underline">
      &larr; Back to Cart
    </a>
    <button
      (click)="proceed()"
      [class.bg-indigo-600]="form.valid"
        [class.bg-gray-400]="form.invalid"
  class="px-6 py-3 text-white rounded-lg font-medium transition-colors"
    >
      Proceed to Payment
    </button>
  </div>
</div>
