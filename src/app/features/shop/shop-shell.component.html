@defer (on timer(0s)) {
  <router-outlet />
} @placeholder (minimum 400ms) {
  <div class="flex min-h-[60vh] items-center justify-center" aria-busy="true" aria-label="Loading shop">
    <div class="w-full max-w-7xl px-4 py-12">
      <div class="mb-8 animate-pulse">
        <div class="mb-2 h-6 w-24 rounded bg-gray-200"></div>
        <div class="h-4 w-48 rounded bg-gray-200"></div>
      </div>

      <div class="mb-6 animate-pulse rounded-xl bg-white p-4 shadow-sm">
        <div class="flex flex-wrap gap-3">
          <div class="h-8 w-20 rounded-full bg-gray-200"></div>
          <div class="h-8 w-24 rounded-full bg-gray-200"></div>
          <div class="h-8 w-16 rounded-full bg-gray-200"></div>
          <div class="h-8 w-28 rounded-full bg-gray-200"></div>
        </div>
      </div>

      <div class="grid animate-pulse gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
        @for (card of skeletonCards; track card) {
          <div class="rounded-xl bg-white shadow-sm">
            <div class="h-48 rounded-t-xl bg-gray-200"></div>
            <div class="space-y-3 p-4">
              <div class="h-3 w-1/3 rounded bg-gray-200"></div>
              <div class="h-4 w-3/4 rounded bg-gray-200"></div>
              <div class="h-3 w-full rounded bg-gray-200"></div>
              <div class="h-4 w-1/4 rounded bg-gray-200"></div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
} @loading (minimum 200ms) {
  <div class="flex items-center justify-center py-20" aria-busy="true">
    <div class="h-8 w-8 animate-spin rounded-full border-4 border-indigo-600 border-t-transparent"></div>
    <span class="ml-3 text-sm text-gray-500">Loading shop...</span>
  </div>
} @error {
  <div class="flex min-h-[40vh] flex-col items-center justify-center gap-3 px-4 text-center">
    <p class="text-sm text-gray-600">Something went wrong while loading the shop.</p>
    <a routerLink="/shop" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
      Try again
    </a>
  </div>
}
